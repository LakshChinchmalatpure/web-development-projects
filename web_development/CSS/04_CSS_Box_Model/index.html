<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css Box Model</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            background-color:aqua;
        }

/* 
With box-sizing:border-box

height:200px;
padding:20px;
border:5px solid black;
box-sizing:border-box;

The browser says:
"Total box height must remain exactly 200px"

Example calculation:

Total height = 200px

Border top + bottom = 10px
Padding top + bottom = 40px

Remaining content height:
200 - 10 - 40 = 150px

So:

Content = 150px
Padding = 40px
Border = 10px

Total = 200px

BUT without border-box:
Content itself = 200px
Then padding and border are added extra
*/

        .box1{
            color: yellow;
            padding: 20px;
            margin: 5px;
            border: 5px solid blue;
            height: 200px;
            box-sizing: border-box;
        }
        .box2{
            color: red;
            padding: 20px;
            margin: 5px;
            border: 5px solid blue;
            height: 200px;
            /* box-sizing: border-box; */

        }

    </style>
</head>
<body>
    <!-- multiple classes  -->
    <div class="box box1">I am a Box</div>
    <div class="box box2">I am a another Box</div>
</body>
</html>
