<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning forms</title>
</head>
<body>
    <h1>Application For Sigma Web Development Course</h1>
    
    <form action="post">
        <div>
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your User Name" autofocus>
        </div>
        <div>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="Female" name="gender" value="Female">
            <label for="Female">Female</label>
        </div>
        <div>
            <input type="checkbox" id="subscribe" name="subscribe" value="yes">
            <label for="subscribe">Subcribe to our App</label>
        </div>
        <div>
            <label for="comment">Enter your Comment</label>
            <br>
            <textarea id="comment" name="comment" rows="4" cols="50">Enter comment Here...
            </textarea>
        </div>
        <div>
            <label for="fruits">Choose Your Fruit</label>
            <br>
            <select name="Fruits" id="fruits">
                <option value="apple">Apple</option>
                <option value="mango">Mango</option>
                <option value="banana">Banana</option>
                <option value="watermelon">Watermelon</option>
            </select>
        </div>
    </form>
</body>
</html>
