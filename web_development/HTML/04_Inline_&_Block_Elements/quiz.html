<!-- Question :- Without using the "br" tag write vertically aligned form ,asking for the name,city,pincode of a city  -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survvey Form</title>
    <link rel="stylesheet" href="quiz.css">
</head>
<body>
    <h1>Survey Form</h1>
    <form action="post"></form>
    <div>
        <label for="name"></label>
        <input type="text" id="name" name="name" placeholder="Enter the Name">
    </div>
    <div>
        <label for="city"></label>
        <input type="text" id="city" name="city" placeholder="Enter the City">
    </div>
    <div>
        <h4>Choose the Gender</h4>
    </div>
    <div>
        
        <label for="female">Female</label>
        <input type="radio" id="female" name="gender" value="female">
    
        <label for="male">Male</label>
        <input type="radio" id="male" name="gender" value="male">
    </div>
    <div>
        <label for="pincode">Pincode</label>
        <input type="number" id="pincode" name="pincode" placeholder="Enter the Pincode">
    </div>


</body>
</html>
